# ─────────────────────────────────────────────────────────────────────────────
# MedVerify — Ansible Configuration
# Sets project-level defaults for all playbook runs.
# ─────────────────────────────────────────────────────────────────────────────

[defaults]
inventory           = inventory.ini
roles_path          = roles
remote_user         = ubuntu           # default SSH user on hospital nodes
private_key_file    = ~/.ssh/medverify_id_rsa
host_key_checking   = False            # set True in strict production environments
retry_files_enabled = False
stdout_callback     = yaml
callback_whitelist  = timer, profile_tasks

# Reduce SSH connection overhead across many hospital nodes
[ssh_connection]
pipelining          = True
ssh_args            = -o ControlMaster=auto -o ControlPersist=60s -o StrictHostKeyChecking=no
