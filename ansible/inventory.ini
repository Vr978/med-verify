# ─────────────────────────────────────────────────────────────────────────────
# MedVerify — Ansible Inventory
#
# Defines on-premise hospital FL client nodes that cannot run in GKE due to
# data residency regulations or air-gapped network requirements.
#
# Replace IP addresses with your actual hospital node addresses.
# Use ansible_host for the real IP and the group name for logical identity.
# ─────────────────────────────────────────────────────────────────────────────

# ── Hospital FL Client Nodes (on-premise / bare-metal) ────────────────────────
[fl_clients]
hospital_a  ansible_host=10.0.1.10  node_id=hospital_a  client_port=8600
hospital_b  ansible_host=10.0.1.11  node_id=hospital_b  client_port=8601
hospital_c  ansible_host=10.0.1.12  node_id=hospital_c  client_port=8602

# ── Shared variables for all FL client nodes ──────────────────────────────────
[fl_clients:vars]
ansible_user=ubuntu
ansible_python_interpreter=/usr/bin/python3
fl_backend_aggregator_url=http://10.0.2.10:8500   # FL aggregator address (GKE LoadBalancer IP)
blockchain_api_url=http://10.0.2.10:8000           # DPoS API address (GKE LoadBalancer IP)
node_role=client
fl_client_base_port=8600
python_version=3.11

# ── (Optional) Jenkins/Ansible Controller ─────────────────────────────────────
# [controller]
# jenkins-agent  ansible_host=10.0.3.10  ansible_user=jenkins
