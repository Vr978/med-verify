# ─────────────────────────────────────────────────────────────────────────────
# SECRETS TEMPLATE — do NOT commit real values to version control.
# Populate with real base64-encoded secrets before applying:
#
#   echo -n "yourvalue" | base64
#
# Apply:
#   kubectl apply -f k8s/secrets.yaml -n medverify
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: medverify-secrets
  namespace: medverify
  labels:
    app: medverify
type: Opaque
data:
  # MongoDB credentials (base64 encoded)
  MONGO_USER: YWRtaW4=          # admin
  MONGO_PASSWORD: CHANGE_ME_BASE64

  # JWT signing secret
  JWT_SECRET: CHANGE_ME_BASE64

  # Delegate private keys (Ed25519, base64 encoded)
  PRIVATE_KEY_HOSPITAL_A: CHANGE_ME_BASE64
  PRIVATE_KEY_HOSPITAL_B: CHANGE_ME_BASE64
  PRIVATE_KEY_HOSPITAL_C: CHANGE_ME_BASE64
